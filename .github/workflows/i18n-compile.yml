# Ensures .po files are valid and compile to .mo (deploy must run the same step;
# *.mo is gitignored — generated at build time).
name: i18n compile

permissions:
  contents: read

on:
  push:
    paths:
      - "translations/**"
      - "babel.cfg"
      - "scripts/generate_po_files.py"
      - "scripts/strip_po_obsolete.py"
      - ".github/workflows/i18n-compile.yml"
  pull_request:
    paths:
      - "translations/**"
      - "babel.cfg"
      - "scripts/generate_po_files.py"
      - "scripts/strip_po_obsolete.py"
      - ".github/workflows/i18n-compile.yml"

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install GNU gettext (msgfmt)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gettext
      - name: Verify PO files (GNU msgfmt strict check)
        run: |
          set -euo pipefail
          for f in translations/*/LC_MESSAGES/messages.po; do
            msgfmt -c -o /dev/null "$f"
          done
      - name: Compile gettext catalogs
        run: pybabel compile -d translations

# Ensures .po files are valid and compile to .mo (deploy must run the same step;
# *.mo is gitignored — generated at build time).
name: i18n compile

on:
  push:
    paths:
      - "translations/**"
      - "babel.cfg"
      - "scripts/generate_po_files.py"
      - ".github/workflows/i18n-compile.yml"
  pull_request:
    paths:
      - "translations/**"
      - "babel.cfg"
      - "scripts/generate_po_files.py"
      - ".github/workflows/i18n-compile.yml"

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile gettext catalogs
        run: pybabel compile -d translations

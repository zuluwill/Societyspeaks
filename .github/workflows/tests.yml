# Runs the pytest suite on every PR and every push to main.
# Python 3.11 matches the Replit runtime (.replit: python-3.11).
# No external services — tests use SQLite in-memory + in-memory rate limiting (see tests/conftest.py).
name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          FLASK_ENV: development
          DATABASE_URL: sqlite:///:memory:
          SECRET_KEY: test-secret-not-for-production
        run: pytest -v --tb=short

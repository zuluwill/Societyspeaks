{# Voice Selector Component Macro #}
{% macro voice_selector(select_id='voice-select', classes='text-sm border border-gray-300 rounded-lg px-3 py-2.5 sm:py-2 bg-white min-h-[44px] sm:min-h-0') %}
<select id="{{ select_id }}" class="{{ classes }}">
    <optgroup label="{{ _('American Accent') }}">
        <option value="professional">{{ _('Professional (US)') }}</option>
        <option value="warm">{{ _('Warm (US)') }}</option>
        <option value="authoritative">{{ _('Authoritative (US)') }}</option>
        <option value="calm">{{ _('Calm (US)') }}</option>
        <option value="friendly">{{ _('Friendly (US)') }}</option>
    </optgroup>
    <optgroup label="{{ _('British Accent') }}">
        <option value="british_professional">{{ _('Professional (British)') }}</option>
        <option value="british_warm">{{ _('Warm (British)') }}</option>
    </optgroup>
</select>
{% endmacro %}

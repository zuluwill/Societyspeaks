{% extends "layout.html" %}
{% block content %}
<div class="max-w-4xl mx-auto py-8 px-4">
  <a href="{{ url_for('programmes.view_programme', slug=programme.slug) }}" class="inline-flex items-center text-sm text-gray-500 hover:text-gray-700 mb-4">
    ← Back to {{ programme.name }}
  </a>
  <div class="bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Edit programme</h1>
    <p class="text-sm text-gray-500 mb-6">{{ programme.name }}</p>
    {% include 'programmes/_form.html' %}
  </div>
</div>
{% endblock %}

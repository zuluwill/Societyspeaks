{% macro mood_grid(level) %}
{# 5x5 dot matrix. Density = current mood (0-4); higher level = more dots filled. #}
<div class="game-mood-grid" data-mood-level="{{ level }}" aria-hidden="true">
  {% for row in range(5) %}
  {% for col in range(5) %}
  {% set distance = ((row - 2)|abs + (col - 2)|abs) %}
  {% set threshold = 4 - level %}
  <span class="game-mood-dot {% if distance >= threshold %}is-filled{% endif %}"></span>
  {% endfor %}
  {% endfor %}
</div>
{% endmacro %}

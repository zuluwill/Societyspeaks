{# errors/429.html #}
{% extends "layout.html" %}
{% block content %}
<div class="min-h-[80vh] bg-gray-50 flex items-center justify-center px-4 py-12">
    <div class="max-w-lg w-full text-center">
        <h1 class="text-9xl font-extrabold text-primary-600 tracking-widest">429</h1>
        <div class="bg-blue-100 px-4 py-2 text-sm rounded-lg text-primary-700 mt-4 inline-block">
            {{ _('Too Many Requests') }}
        </div>
        <div class="mt-8">
            <h2 class="text-2xl font-semibold text-gray-800 mb-4">{{ _('Rate Limit Exceeded') }}</h2>
            <p class="text-gray-600 mb-8">{{ _("You've made too many requests. Please wait a while before trying again.") }}</p>
            <div class="space-x-4">
                <button id="go-back-btn" class="inline-block bg-gray-200 text-gray-800 px-6 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-colors">
                    {{ _('Go Back') }}
                </button>
                <a href="{{ url_for('main.index') }}" class="inline-block bg-primary-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-primary-700 transition-colors">
                    {{ _('Return Home') }}
                </a>
            </div>
        </div>
    </div>
</div>
<script nonce="{{ csp_nonce() }}">
  document.getElementById('go-back-btn')?.addEventListener('click', function() { history.back(); });
</script>
{% endblock %}

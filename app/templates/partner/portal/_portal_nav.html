{# _portal_nav.html — shared sticky nav for all Partner Portal pages.
   Expects: partner, portal_page ('dashboard'|'discussions'|'setup'|'detail'), is_admin_preview #}
<nav class="bg-white border-b border-gray-200 sticky top-0 z-30">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-14 gap-4">

      <div class="flex items-center gap-1 min-w-0 overflow-x-auto">
        <span class="font-semibold text-gray-800 text-sm mr-3 shrink-0 hidden sm:block truncate max-w-[160px]">
          {{ partner.name }}
        </span>
        <a href="{{ url_for('partner.portal_dashboard') }}"
           class="px-3 py-1.5 rounded-md text-sm font-medium whitespace-nowrap transition-colors
                  {% if portal_page == 'dashboard' %}bg-blue-50 text-blue-700{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %}">
          Dashboard
        </a>
        <a href="{{ url_for('partner.portal_discussions') }}"
           class="px-3 py-1.5 rounded-md text-sm font-medium whitespace-nowrap transition-colors
                  {% if portal_page in ('discussions', 'detail') %}bg-blue-50 text-blue-700{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %}">
          Discussions
        </a>
        <a href="{{ url_for('partner.portal_getting_started') }}"
           class="px-3 py-1.5 rounded-md text-sm font-medium whitespace-nowrap transition-colors
                  {% if portal_page == 'setup' %}bg-blue-50 text-blue-700{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %}">
          Setup guide
        </a>
      </div>

      <div class="flex items-center gap-3 shrink-0">
        {% if is_admin_preview %}
        <form method="POST" action="{{ url_for('admin.stop_partner_preview') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button class="inline-flex items-center rounded-md bg-blue-50 border border-blue-200 px-2.5 py-1 text-xs font-semibold text-blue-800 hover:bg-blue-100 transition-colors">
            Admin preview &middot; Exit
          </button>
        </form>
        {% endif %}
        <a href="{{ url_for('partner.portal_logout') }}"
           class="text-sm text-gray-500 hover:text-gray-900 transition-colors whitespace-nowrap">
          Sign out
        </a>
      </div>

    </div>
  </div>
</nav>

{% extends "layout.html" %}

{% block extra_head %}
<meta name="robots" content="noindex, nofollow" />
{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-lg shadow-md text-center">
    <h1 class="text-2xl font-bold text-gray-800">{{ _('Sign in to Society Speaks') }}</h1>
    <p class="mt-2 text-sm text-gray-600">
        {{ _("You're about to sign in as") }}
        <strong class="text-gray-900 break-all">{{ email }}</strong>.
    </p>

    <form method="POST" action="{{ url_for('auth.magic_link_consume', token=token) }}" class="mt-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit" id="magic-link-continue-btn"
                class="w-full bg-blue-500 hover:bg-primary-600 text-white font-bold py-3 px-4 rounded-lg transition min-h-11">
            {{ _('Continue') }}
        </button>
    </form>

    <p class="mt-6 text-xs text-gray-500">
        {{ _("If you didn't request this, close this page — no account change will happen.") }}
    </p>

    <script nonce="{{ csp_nonce() }}">
      (function () {
        var form = document.querySelector('form[action*="magic-link"]');
        var btn  = document.getElementById('magic-link-continue-btn');
        if (form && btn) {
          form.addEventListener('submit', function () {
            btn.disabled = true;
            btn.textContent = '{{ _("Signing in…") }}';
          });
        }
      })();
    </script>
</div>
{% endblock %}

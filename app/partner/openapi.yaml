openapi: 3.0.3
info:
  title: Society Speaks Partner API
  description: |
    Integrate Society Speaks on your site. Look up discussions by article URL,
    get participation snapshots, and embed the voting widget.
    API keys are issued in the Partner Portal and sent as `X-API-Key`.
    Write/management endpoints are server-to-server only (browser `Origin` requests are rejected).
    All endpoints return JSON. See the [Partner Hub](.) for full documentation.
  version: 1.0.0
  contact:
    name: Society Speaks
    url: https://societyspeaks.io

servers:
  - url: /
    description: Same origin (use when trying from API Playground)

paths:
  /api/discussions/by-article-url:
    get:
      summary: Lookup by article URL
      description: Find a discussion by the URL of your article. Returns embed, consensus, and snapshot URLs.
      operationId: lookupByArticleUrl
      parameters:
        - name: url
          in: query
          required: true
          description: The article URL (URL-encoded)
          schema:
            type: string
            example: "https://example.com/article"
        - name: ref
          in: query
          required: false
          description: Partner reference for analytics
          schema:
            type: string
        - name: X-API-Key
          in: header
          required: false
          description: Portal-issued partner test/live API key (required for test environment access)
          schema:
            type: string
      responses:
        '200':
          description: Discussion found
          content:
            application/json:
              schema:
                type: object
                properties:
                  discussion_id:
                    type: integer
                  slug:
                    type: string
                  title:
                    type: string
                  embed_url:
                    type: string
                    format: uri
                  consensus_url:
                    type: string
                    format: uri
                  snapshot_url:
                    type: string
                    format: uri
                  source:
                    type: string
                    enum: [rss, partner]
                  env:
                    type: string
                    enum: [test, live]
        '400':
          description: Invalid or missing URL
        '403':
          description: Embed and API access revoked for this partner ref
        '404':
          description: No discussion found for this URL
        '429':
          description: Too many requests; includes Retry-After header
          headers:
            Retry-After:
              description: Seconds until the next request is allowed
              schema:
                type: integer
                example: 60

  /api/discussions/{discussion_id}/snapshot:
    get:
      summary: Get discussion snapshot
      description: Get participation counts and metadata. Does not include analysis content.
      operationId: getSnapshot
      parameters:
        - name: discussion_id
          in: path
          required: true
          schema:
            type: integer
        - name: ref
          in: query
          required: false
          schema:
            type: string
        - name: X-API-Key
          in: header
          required: false
          description: Portal-issued partner test/live API key (required for test environment access)
          schema:
            type: string
      responses:
        '200':
          description: Snapshot data
          content:
            application/json:
              schema:
                type: object
                properties:
                  discussion_id:
                    type: integer
                  discussion_title:
                    type: string
                  participant_count:
                    type: integer
                  statement_count:
                    type: integer
                  has_analysis:
                    type: boolean
                  consensus_url:
                    type: string
                    format: uri
                  env:
                    type: string
                    enum: [test, live]
                  opinion_groups:
                    type: integer
                    description: Present when has_analysis is true
                  analyzed_at:
                    type: string
                    format: date-time
                  teaser_text:
                    type: string
        '403':
          description: Partner disabled or test discussion requires valid test API key
        '404':
          description: Discussion not found
        '429':
          description: Too many requests; includes Retry-After header
          headers:
            Retry-After:
              description: Seconds until the next request is allowed
              schema:
                type: integer
                example: 60

  /api/oembed:
    get:
      summary: oEmbed provider
      description: Returns oEmbed JSON for Society Speaks discussion URLs (for platforms that support oEmbed).
      operationId: getOembed
      parameters:
        - name: url
          in: query
          required: true
          description: Society Speaks discussion or consensus URL
          schema:
            type: string
            format: uri
        - name: maxwidth
          in: query
          schema:
            type: integer
        - name: maxheight
          in: query
          schema:
            type: integer
        - name: format
          in: query
          schema:
            type: string
            enum: [json]
            default: json
      responses:
        '200':
          description: oEmbed response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    example: "rich"
                  version:
                    type: string
                  title:
                    type: string
                  provider_name:
                    type: string
                  html:
                    type: string
                  width:
                    type: integer
                  height:
                    type: integer
                  cache_age:
                    type: integer
                    description: Recommended cache duration in seconds
                    example: 3600
        '400':
          description: Invalid URL
        '404':
          description: Discussion not found
        '501':
          description: Unsupported format (only JSON supported)
        '429':
          description: Too many requests; includes Retry-After header
          headers:
            Retry-After:
              description: Seconds until the next request is allowed
              schema:
                type: integer
                example: 60

  /api/embed/flag:
    post:
      summary: Flag statement from embed
      description: Report a problematic statement from an embedded discussion.
      operationId: flagStatementFromEmbed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - statement_id
                - flag_reason
              properties:
                statement_id:
                  type: integer
                flag_reason:
                  type: string
                  enum: [spam, harassment, misinformation, off_topic]
                ref:
                  type: string
                  description: Partner reference for tracking
      responses:
        '201':
          description: Flag recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Invalid request
        '404':
          description: Statement not found
        '409':
          description: Already flagged from this session

  /api/partner/discussions:
    post:
      summary: Create discussion (authenticated)
      description: |
        Create a discussion for an article not ingested via RSS.
        Requires a portal-issued `X-API-Key` and must be called server-to-server
        (requests with browser `Origin` are rejected).
        For each seed statement, optional `position` (pro|con|neutral) is stored as `Statement.seed_stance`.
      operationId: createDiscussion
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                article_url:
                  type: string
                  format: uri
                  description: Optional canonical article URL. Provide this, external_id, or both.
                external_id:
                  type: string
                  maxLength: 128
                  description: Optional stable partner-defined ID for non-article or internal CMS discussions.
                embed_statement_submissions_enabled:
                  type: boolean
                  default: false
                  description: Optional. Allow readers to submit statements directly from embed for this discussion.
                title:
                  type: string
                  maxLength: 200
                excerpt:
                  type: string
                  maxLength: 5000
                source_name:
                  type: string
                  maxLength: 200
                seed_statements:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    required: [content]
                    properties:
                      content:
                        type: string
                        minLength: 10
                        maxLength: 500
                      position:
                        type: string
                        enum: [pro, con, neutral]
      responses:
        '201':
          description: Discussion created
          content:
            application/json:
              schema:
                type: object
                properties:
                  discussion_id:
                    type: integer
                  slug:
                    type: string
                  title:
                    type: string
                  partner_article_url:
                    type: string
                    nullable: true
                  external_id:
                    type: string
                    nullable: true
                  embed_statement_submissions_enabled:
                    type: boolean
                  embed_url:
                    type: string
                  consensus_url:
                    type: string
                  snapshot_url:
                    type: string
                  source:
                    type: string
                    example: partner
                  env:
                    type: string
                    enum: [test, live]
                  statement_count:
                    type: integer
        '400':
          description: Invalid request, missing identifier (article_url|external_id), or missing excerpt/seed_statements
        '401':
          description: Missing or invalid API key
        '402':
          description: Live API requires active subscription
        '403':
          description: Partner inactive, embed/API disabled, or browser request not allowed (use server-to-server)
        '409':
          description: Discussion already exists for this URL
        '429':
          description: Rate limit or tier limit exceeded. Rate limit responses include Retry-After header; tier limit (plan cap) does not.
          headers:
            Retry-After:
              description: Present only for rate limit (60s). Omitted for tier/plan limit.
              schema:
                type: integer
                example: 60

    get:
      summary: List partner discussions
      description: |
        Returns discussions owned by this partner.
        Requires portal-issued `X-API-Key`; server-to-server only (no browser `Origin`).
        Supports pagination and env filter.
      operationId: listPartnerDiscussions
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: env
          schema:
            type: string
            enum: [test, live, all]
          description: Filter by environment (default all)
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Paginated list of discussions with embed/consensus URLs and vote counts
        '401':
          description: Missing or invalid API key
        '403':
          description: Browser Origin not allowed, partner inactive, or partner API disabled

  /api/partner/discussions/by-external-id:
    get:
      summary: Find partner discussion by external ID
      description: |
        Returns a partner-owned discussion by exact `external_id`.
        Requires portal-issued `X-API-Key`; server-to-server only (no browser `Origin`).
      operationId: getPartnerDiscussionByExternalId
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: external_id
          required: true
          schema:
            type: string
            maxLength: 128
        - in: query
          name: env
          schema:
            type: string
            enum: [test, live, all]
          description: Optional env filter; defaults to key env.
      responses:
        '200':
          description: Discussion found
        '400':
          description: Missing or invalid external_id
        '401':
          description: Missing or invalid API key
        '403':
          description: Browser Origin not allowed, partner inactive, API disabled, or wrong env key
        '404':
          description: No discussion found for this external_id

  /api/partner/analytics/usage-export:
    get:
      summary: Export partner usage events
      description: |
        Export raw partner API usage events for reporting.
        Requires portal-issued `X-API-Key`; server-to-server only.
      operationId: exportPartnerUsage
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
          description: Export window in days
        - in: query
          name: env
          schema:
            type: string
            enum: [test, live, all]
            default: all
        - in: query
          name: format
          schema:
            type: string
            enum: [json, csv]
            default: json
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        '200':
          description: Usage export (JSON payload or CSV attachment)
        '400':
          description: Invalid format or non-portal partner key
        '401':
          description: Missing or invalid API key

  /api/partner/webhooks:
    get:
      summary: List partner webhook endpoints
      description: |
        Returns webhook endpoints configured for this partner account.
        Requires portal-issued `X-API-Key`; server-to-server only.
      operationId: listPartnerWebhooks
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Webhook endpoint list
        '400':
          description: Non-portal partner key
        '401':
          description: Missing or invalid API key
    post:
      summary: Create partner webhook endpoint
      description: |
        Creates a webhook endpoint and returns a signing secret once.
        Requires portal-issued `X-API-Key`; server-to-server only.
      operationId: createPartnerWebhook
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, event_types]
              properties:
                url:
                  type: string
                  format: uri
                  description: HTTPS webhook receiver URL
                event_types:
                  type: array
                  items:
                    type: string
                    enum: [discussion.created, discussion.updated, consensus.updated, key.revoked, domain.verification_changed]
      responses:
        '201':
          description: Endpoint created (includes signing_secret once)
        '400':
          description: Validation error
        '401':
          description: Missing or invalid API key

  /api/partner/webhooks/{endpoint_id}:
    patch:
      summary: Update webhook endpoint
      operationId: patchPartnerWebhook
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: endpoint_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, paused, disabled]
                event_types:
                  type: array
                  items:
                    type: string
                    enum: [discussion.created, discussion.updated, consensus.updated, key.revoked, domain.verification_changed]
      responses:
        '200':
          description: Endpoint updated
        '404':
          description: Endpoint not found
    delete:
      summary: Delete webhook endpoint
      operationId: deletePartnerWebhook
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: endpoint_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Endpoint deleted
        '404':
          description: Endpoint not found

  /api/partner/webhooks/{endpoint_id}/rotate-secret:
    post:
      summary: Rotate webhook signing secret
      operationId: rotatePartnerWebhookSecret
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: endpoint_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Secret rotated (includes signing_secret once)
        '404':
          description: Endpoint not found

  /api/partner/discussions/{discussion_id}:
    patch:
      summary: Update discussion (close, integrity mode, embed submissions)
      description: |
        Requires portal-issued `X-API-Key`. Server-to-server only.
        Toggle is_closed, integrity_mode, and/or embed_statement_submissions_enabled.
      operationId: patchPartnerDiscussion
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: discussion_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_closed:
                  type: boolean
                integrity_mode:
                  type: boolean
                embed_statement_submissions_enabled:
                  type: boolean
      responses:
        '200':
          description: Updated discussion metadata
        '403':
          description: Not owned by this partner or wrong env key
        '404':
          description: Discussion not found

  /api/partner/discussions/{discussion_id}/statements:
    post:
      summary: Add seed statements
      description: |
        Requires portal-issued `X-API-Key`. Server-to-server only.
        Append moderator-approved seed statements after creation.
        Each item's `position` (pro | con | neutral) is persisted on the statement as `seed_stance`.
      operationId: addPartnerDiscussionStatements
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: discussion_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - seed_statements
              properties:
                seed_statements:
                  type: array
                  items:
                    type: object
                    required: [content]
                    properties:
                      content:
                        type: string
                      position:
                        type: string
                        enum: [pro, con, neutral]
      responses:
        '201':
          description: Statements added
        '429':
          description: Discussion statement cap reached

  /api/partner/discussions/{discussion_id}/flags:
    get:
      summary: List statement flags (moderation inbox)
      description: |
        Requires portal-issued `X-API-Key`. Server-to-server only.
        Pending and reviewed flags for statements in this discussion.
      operationId: listPartnerDiscussionFlags
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: discussion_id
          required: true
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, reviewed, dismissed, all]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Paginated flag list

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Portal-issued partner API key (required for authenticated partner endpoints)

[python: app/**.py]
encoding = utf-8
# Second argument to _subject_for_user is the gettext msgid (see app/resend_client.py).
# Without this, pybabel only sees gettext/_() calls, not subject strings passed into the helper.
keywords = _subject_for_user:2

# In HTML templates, use the Jinja filter `escape_i18n` (see app/lib/jinja_i18n.py) on
# {{ _('...') }} when the msgid may include & or < in a text/attribute and gettext returns
# Markup, so the default |e filter does not double-apply as needed.

[jinja2: app/templates/**.html]
encoding = utf-8
silent = false
extensions=jinja2.ext.i18n

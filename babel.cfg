[python: app/**.py]
encoding = utf-8
# Custom extraction keywords (Babel keeps default _, gettext, ngettext, etc.):
# - _subject_for_user:2 — second arg is the gettext msgid (app/resend_client.py).
# - _l — alias of flask_babel.lazy_gettext used across forms and the editorial
#   library; without this entry pybabel misses every lazy_gettext call site.
keywords = _subject_for_user:2 _l

# In HTML templates, use the Jinja filter `escape_i18n` (see app/lib/jinja_i18n.py) on
# {{ _('...') }} when the msgid may include & or < in a text/attribute and gettext returns
# Markup, so the default |e filter does not double-apply as needed.

[jinja2: app/templates/**.html]
encoding = utf-8
silent = false
extensions=jinja2.ext.i18n
